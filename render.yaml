services:
  - type: web
    name: notepad
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: INGEST_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
