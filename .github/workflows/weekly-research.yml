name: Weekly Research (manual/backup)

# Automatic weekly scheduling runs on the user's Mac via launchd
# (scripts/local-runner.sh). This workflow is kept as a manual/backup path —
# add ANTHROPIC_API_KEY secret to enable, then Run workflow → pick source.

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source to run (product_hunt, indie_hackers, hacker_news, reddit)
        required: true
        default: product_hunt
        type: choice
        options:
          - product_hunt
          - indie_hackers
          - hacker_news
          - reddit

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        run: python scripts/generate_report.py ${{ github.event.inputs.source }}
